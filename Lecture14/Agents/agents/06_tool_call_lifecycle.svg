<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="650" viewBox="0 0 1300 650">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#faf5ff"/><stop offset="1" stop-color="#ede9fe"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/>
  </linearGradient>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/></marker>
  <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/></marker>
  <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/></marker>
  <style>
    .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:34px;font-weight:800;fill:#111827;}
    .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-style:italic;fill:#4b5563;}
    .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:21px;font-weight:750;fill:#111827;}
    .sh{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;font-weight:700;fill:#374151;}
    .txt{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151;}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#4b5563;}
    .tiny{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;fill:#6b7280;}
    .code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;fill:#111827;}
    .num{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:white;}
    .icon{font-family:Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif;font-size:25px;}
  </style>
</defs>
<rect width="1300" height="650" fill="url(#bg)"/><text x="650" y="48" class="title" text-anchor="middle">Tool Call Lifecycle</text><text x="650" y="78" class="subtitle" text-anchor="middle">How structured model output becomes real Python execution</text><rect x="70" y="240" width="170" height="120" rx="18" fill="url(#purple)" stroke="#6d28d9" stroke-width="2" filter="url(#shadow)"/><circle cx="98" cy="268" r="15" fill="#6d28d9"/><text x="98" y="273" class="num" text-anchor="middle">1</text><text x="155" y="292" class="sh" text-anchor="middle"><tspan x="155" dy="0">LLM Output</tspan></text><text x="155" y="325" class="small" text-anchor="middle"><tspan x="155" dy="0">tool_call JSON</tspan></text><line x1="240" y1="300" x2="295" y2="300" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)"/><rect x="275" y="240" width="170" height="120" rx="18" fill="#ffffff" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/><circle cx="303" cy="268" r="15" fill="#64748b"/><text x="303" y="273" class="num" text-anchor="middle">2</text><text x="360" y="292" class="sh" text-anchor="middle"><tspan x="360" dy="0">Parse Arguments</tspan></text><text x="360" y="325" class="small" text-anchor="middle"><tspan x="360" dy="0">json.loads(...)</tspan></text><line x1="445" y1="300" x2="500" y2="300" stroke="#64748b" stroke-width="3" marker-end="url(#arrowAmber)"/><rect x="480" y="240" width="170" height="120" rx="18" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><circle cx="508" cy="268" r="15" fill="#15803d"/><text x="508" y="273" class="num" text-anchor="middle">3</text><text x="565" y="292" class="sh" text-anchor="middle"><tspan x="565" dy="0">Registry Lookup</tspan></text><text x="565" y="325" class="small" text-anchor="middle"><tspan x="565" dy="0">name → function</tspan></text><line x1="650" y1="300" x2="705" y2="300" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><rect x="685" y="240" width="170" height="120" rx="18" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><circle cx="713" cy="268" r="15" fill="#15803d"/><text x="713" y="273" class="num" text-anchor="middle">4</text><text x="770" y="292" class="sh" text-anchor="middle"><tspan x="770" dy="0">Execute Function</tspan></text><text x="770" y="325" class="small" text-anchor="middle"><tspan x="770" dy="0">fn(**args)</tspan></text><line x1="855" y1="300" x2="910" y2="300" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><rect x="890" y="240" width="170" height="120" rx="18" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><circle cx="918" cy="268" r="15" fill="#1d4ed8"/><text x="918" y="273" class="num" text-anchor="middle">5</text><text x="975" y="292" class="sh" text-anchor="middle"><tspan x="975" dy="0">Tool Result</tspan></text><text x="975" y="325" class="small" text-anchor="middle"><tspan x="975" dy="0">string / JSON output</tspan></text><line x1="1060" y1="300" x2="1115" y2="300" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="1095" y="240" width="170" height="120" rx="18" fill="url(#amber)" stroke="#b45309" stroke-width="2" filter="url(#shadow)"/><circle cx="1123" cy="268" r="15" fill="#b45309"/><text x="1123" y="273" class="num" text-anchor="middle">6</text><text x="1180" y="292" class="sh" text-anchor="middle"><tspan x="1180" dy="0">Append Message</tspan></text><text x="1180" y="325" class="small" text-anchor="middle"><tspan x="1180" dy="0">role = tool</tspan></text><rect x="330" y="450" width="640" height="115" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/><text x="650" y="488" class="h" text-anchor="middle"><tspan x="650" dy="0">Example</tspan></text><text x="650" y="525" class="code" text-anchor="middle"><tspan x="650" dy="0">{"name": "get_weather", "arguments": {"city": "Medellín"}}</tspan><tspan x="650" dy="24">→ get_weather(city="Medellín") → "Medellín: 24°C"</tspan></text></svg>