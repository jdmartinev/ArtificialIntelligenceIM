<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="710" viewBox="0 0 1300 710">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#faf5ff"/><stop offset="1" stop-color="#ede9fe"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/>
  </linearGradient>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/></marker>
  <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/></marker>
  <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/></marker>
  <style>
    .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:34px;font-weight:800;fill:#111827;}
    .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-style:italic;fill:#4b5563;}
    .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:21px;font-weight:750;fill:#111827;}
    .sh{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;font-weight:700;fill:#374151;}
    .txt{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151;}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#4b5563;}
    .tiny{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;fill:#6b7280;}
    .code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;fill:#111827;}
    .num{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:white;}
    .icon{font-family:Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif;font-size:25px;}
  </style>
</defs>
<rect width="1300" height="710" fill="url(#bg)"/><text x="650" y="48" class="title" text-anchor="middle">Agentic Loop</text><text x="650" y="78" class="subtitle" text-anchor="middle">The minimal control logic that converts an LLM into an agent</text><rect x="535" y="120" width="230" height="70" rx="16" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><text x="650" y="161" class="sh" text-anchor="middle"><tspan x="650" dy="0">Messages State</tspan></text><rect x="535" y="250" width="230" height="70" rx="16" fill="url(#purple)" stroke="#6d28d9" stroke-width="2" filter="url(#shadow)"/><text x="650" y="291" class="sh" text-anchor="middle"><tspan x="650" dy="0">LLM Call</tspan></text><rect x="535" y="380" width="230" height="70" rx="16" fill="#ffffff" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/><text x="650" y="421" class="sh" text-anchor="middle"><tspan x="650" dy="0">finish_reason?</tspan></text><rect x="275" y="510" width="230" height="70" rx="16" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="390" y="551" class="sh" text-anchor="middle"><tspan x="390" dy="0">Parse Tool Calls</tspan></text><rect x="535" y="510" width="230" height="70" rx="16" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="650" y="551" class="sh" text-anchor="middle"><tspan x="650" dy="0">Execute Tool</tspan></text><rect x="795" y="510" width="230" height="70" rx="16" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><text x="910" y="551" class="sh" text-anchor="middle"><tspan x="910" dy="0">Append Observation</tspan></text><rect x="795" y="380" width="230" height="70" rx="16" fill="url(#amber)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/><text x="910" y="421" class="sh" text-anchor="middle"><tspan x="910" dy="0">Final Answer</tspan></text><line x1="650" y1="190" x2="650" y2="250" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)"/><line x1="650" y1="320" x2="650" y2="380" stroke="#64748b" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="765" y1="415" x2="795" y2="415" stroke="#b45309" stroke-width="3" marker-end="url(#arrowAmber)"/><text x="780" y="395" class="small" text-anchor="middle"><tspan x="780" dy="0">stop</tspan></text><path d="M 650 450 C 610 505 485 500 405 510" fill="none" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><text x="535" y="483" class="small" text-anchor="middle"><tspan x="535" dy="0">tool_calls</tspan></text><line x1="505" y1="545" x2="535" y2="545" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><line x1="765" y1="545" x2="795" y2="545" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><path d="M 910 510 C 1095 420 1040 150 765 155" fill="none" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)" stroke-dasharray="8 8"/><text x="1055" y="305" class="small" text-anchor="middle"><tspan x="1055" dy="0">repeat with</tspan><tspan x="1055" dy="22">updated state</tspan></text><rect x="105" y="330" width="220" height="170" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/><text x="215" y="365" class="sh" text-anchor="middle"><tspan x="215" dy="0">Control Flow</tspan></text><text x="215" y="400" class="txt" text-anchor="middle"><tspan x="215" dy="0">The loop is outside</tspan><tspan x="215" dy="22">the model. It is</tspan><tspan x="215" dy="22">ordinary Python code.</tspan></text></svg>