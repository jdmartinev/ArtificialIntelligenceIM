<rect width="1200" height="680" fill="url(#bg)"/><text x="600" y="48" class="title" text-anchor="middle">LLM vs Agent</text><text x="600" y="78" class="subtitle" text-anchor="middle">Text generation versus action-oriented problem solving</text><rect x="90" y="150" width="420" height="360" rx="18" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><text x="300" y="192" class="h" text-anchor="middle"><tspan x="300" dy="0">LLM-only Flow</tspan></text><rect x="160" y="250" width="280" height="64" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/><text x="300" y="290" class="sh" text-anchor="middle"><tspan x="300" dy="0">User Prompt</tspan></text><line x1="300" y1="314" x2="300" y2="365" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="160" y="365" width="280" height="64" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/><text x="300" y="405" class="sh" text-anchor="middle"><tspan x="300" dy="0">LLM</tspan></text><line x1="300" y1="429" x2="300" y2="480" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="160" y="480" width="280" height="64" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/><text x="300" y="520" class="sh" text-anchor="middle"><tspan x="300" dy="0">Text Output</tspan></text><rect x="690" y="150" width="420" height="470" rx="18" fill="url(#purple)" stroke="#6d28d9" stroke-width="2" filter="url(#shadow)"/><text x="900" y="192" class="h" text-anchor="middle"><tspan x="900" dy="0">Agent Flow</tspan></text><rect x="760" y="245" width="280" height="58" rx="14" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/><circle cx="790" cy="274" r="15" fill="#1d4ed8"/><text x="790" y="279" class="num" text-anchor="middle">1</text><text x="920" y="280" class="sh" text-anchor="middle"><tspan x="920" dy="0">User Prompt</tspan></text><line x1="900" y1="303" x2="900" y2="337" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="760" y="337" width="280" height="58" rx="14" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/><circle cx="790" cy="366" r="15" fill="#6d28d9"/><text x="790" y="371" class="num" text-anchor="middle">2</text><text x="920" y="372" class="sh" text-anchor="middle"><tspan x="920" dy="0">LLM reasoning</tspan></text><line x1="900" y1="395" x2="900" y2="429" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)"/><rect x="760" y="429" width="280" height="58" rx="14" fill="#fff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><circle cx="790" cy="458" r="15" fill="#15803d"/><text x="790" y="463" class="num" text-anchor="middle">3</text><text x="920" y="464" class="sh" text-anchor="middle"><tspan x="920" dy="0">Tool action</tspan></text><line x1="900" y1="487" x2="900" y2="521" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><rect x="760" y="521" width="280" height="58" rx="14" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/><circle cx="790" cy="550" r="15" fill="#1d4ed8"/><text x="790" y="555" class="num" text-anchor="middle">4</text><text x="920" y="556" class="sh" text-anchor="middle"><tspan x="920" dy="0">Observation</tspan></text><line x1="900" y1="579" x2="900" y2="613" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="760" y="613" width="280" height="58" rx="14" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/><circle cx="790" cy="642" r="15" fill="#b45309"/><text x="790" y="647" class="num" text-anchor="middle">5</text><text x="920" y="648" class="sh" text-anchor="middle"><tspan x="920" dy="0">Final Answer</tspan></text><path d="M 730 390 C 675 390 675 520 760 520" fill="none" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)" stroke-dasharray="8 8"/><text x="645" y="455" class="small" text-anchor="middle"><tspan x="645" dy="0">Iteration</tspan><tspan x="645" dy="22">when needed</tsp