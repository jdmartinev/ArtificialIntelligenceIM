<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="730" viewBox="0 0 1300 730">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#faf5ff"/><stop offset="1" stop-color="#ede9fe"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/>
  </linearGradient>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/></marker>
  <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/></marker>
  <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/></marker>
  <style>
    .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:34px;font-weight:800;fill:#111827;}
    .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-style:italic;fill:#4b5563;}
    .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:21px;font-weight:750;fill:#111827;}
    .sh{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;font-weight:700;fill:#374151;}
    .txt{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151;}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#4b5563;}
    .tiny{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;fill:#6b7280;}
    .code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;fill:#111827;}
    .num{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:white;}
    .icon{font-family:Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif;font-size:25px;}
  </style>
</defs>
<rect width="1300" height="730" fill="url(#bg)"/><text x="650" y="48" class="title" text-anchor="middle">Tool Abstraction</text><text x="650" y="78" class="subtitle" text-anchor="middle">A tool has an execution layer and an LLM-readable interface</text><rect x="115" y="150" width="445" height="430" rx="18" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="337" y="195" class="h" text-anchor="middle"><tspan x="337" dy="0">Python Function</tspan></text><text x="337" y="225" class="txt" text-anchor="middle"><tspan x="337" dy="0">Real execution performed by the agent runtime</tspan></text><rect x="180" y="275" width="315" height="150" rx="14" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><text x="205" y="315" class="code" text-anchor="start"><tspan x="205" dy="0">def get_weather(city):</tspan><tspan x="205" dy="22">    r = httpx.get(...)</tspan><tspan x="205" dy="22">    return r.text</tspan></text><text x="337" y="485" class="txt" text-anchor="middle"><tspan x="337" dy="0">The LLM never executes this code.</tspan><tspan x="337" dy="22">The Python process does.</tspan></text><rect x="740" y="150" width="445" height="430" rx="18" fill="url(#purple)" stroke="#6d28d9" stroke-width="2" filter="url(#shadow)"/><text x="962" y="195" class="h" text-anchor="middle"><tspan x="962" dy="0">JSON Schema</tspan></text><text x="962" y="225" class="txt" text-anchor="middle"><tspan x="962" dy="0">Contract exposed to the model</tspan></text><rect x="805" y="275" width="315" height="150" rx="14" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/><text x="830" y="310" class="code" text-anchor="start"><tspan x="830" dy="0">{</tspan><tspan x="830" dy="22">  "name": "get_weather",</tspan><tspan x="830" dy="22">  "parameters": {</tspan><tspan x="830" dy="22">    "city": "string"</tspan><tspan x="830" dy="22">  }</tspan><tspan x="830" dy="22">}</tspan></text><text x="962" y="485" class="txt" text-anchor="middle"><tspan x="962" dy="0">The model reads this description</tspan><tspan x="962" dy="22">and emits structured arguments.</tspan></text><line x1="560" y1="365" x2="740" y2="365" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)"/><text x="650" y="340" class="small" text-anchor="middle"><tspan x="650" dy="0">Tool identity</tspan><tspan x="650" dy="22">+ arguments</tspan></text><rect x="455" y="615" width="390" height="62" rx="18" fill="url(#amber)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/><text x="650" y="654" class="sh" text-anchor="middle"><tspan x="650" dy="0">Key idea: the LLM sees schema, not code.</tspan></text></svg>