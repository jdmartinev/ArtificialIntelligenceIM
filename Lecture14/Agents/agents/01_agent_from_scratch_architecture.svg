<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#faf5ff"/><stop offset="1" stop-color="#ede9fe"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
  </linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/>
  </linearGradient>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/></marker>
  <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/></marker>
  <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/></marker>
  <style>
    .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:34px;font-weight:800;fill:#111827;}
    .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-style:italic;fill:#4b5563;}
    .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:21px;font-weight:750;fill:#111827;}
    .sh{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;font-weight:700;fill:#374151;}
    .txt{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151;}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#4b5563;}
    .tiny{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;fill:#6b7280;}
    .code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;fill:#111827;}
    .num{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:white;}
    .icon{font-family:Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif;font-size:25px;}
  </style>
</defs>
<rect width="1400" height="840" fill="url(#bg)"/>
<text x="700" y="48" class="title" text-anchor="middle">Agent from Scratch: Architecture</text>
<text x="700" y="78" class="subtitle" text-anchor="middle">From prompt to action through tools, observations, and a final answer</text>
<rect x="55" y="165" width="245" height="130" rx="18" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><circle cx="95" cy="205" r="15" fill="#1d4ed8"/><text x="95" y="210" class="num" text-anchor="middle">1</text><text x="128" y="204" class="h" text-anchor="start"><tspan x="128" dy="0">User Input</tspan></text><text x="78" y="240" class="txt" text-anchor="start"><tspan x="78" dy="0">e.g.,</tspan><tspan x="78" dy="22">“How is the weather</tspan><tspan x="78" dy="22">in Medellín now?”</tspan></text><rect x="380" y="125" width="500" height="520" rx="18" fill="url(#purple)" stroke="#6d28d9" stroke-width="2" filter="url(#shadow)"/><text x="630" y="165" class="h" text-anchor="middle"><tspan x="630" dy="0">🤖  Agent Runtime + LLM</tspan></text><text x="630" y="200" class="txt" text-anchor="middle"><tspan x="630" dy="0">The agent coordinates an iterative loop:</tspan><tspan x="630" dy="22">Reasoning → Action → Observation → Response</tspan></text><text x="430" y="275" class="icon">💭</text><circle cx="490" cy="270" r="15" fill="#6d28d9"/><text x="490" y="275" class="num" text-anchor="middle">2</text><text x="530" y="267" class="sh" text-anchor="start"><tspan x="530" dy="0">Thought</tspan></text><text x="530" y="291" class="txt" text-anchor="start"><tspan x="530" dy="0">Decide whether a tool is needed.</tspan></text><line x1="455" y1="297" x2="455" y2="343" stroke="#6d28d9" stroke-width="2.5" marker-end="url(#arrowPurple)" stroke-dasharray="8 8"/><text x="430" y="380" class="icon">🔧</text><circle cx="490" cy="375" r="15" fill="#15803d"/><text x="490" y="380" class="num" text-anchor="middle">3</text><text x="530" y="372" class="sh" text-anchor="start"><tspan x="530" dy="0">Action</tspan></text><text x="530" y="396" class="txt" text-anchor="start"><tspan x="530" dy="0">Emit a structured tool call.</tspan></text><line x1="455" y1="402" x2="455" y2="448" stroke="#6d28d9" stroke-width="2.5" marker-end="url(#arrowPurple)" stroke-dasharray="8 8"/><text x="430" y="485" class="icon">👁</text><circle cx="490" cy="480" r="15" fill="#1d4ed8"/><text x="490" y="485" class="num" text-anchor="middle">4</text><text x="530" y="477" class="sh" text-anchor="start"><tspan x="530" dy="0">Observation</tspan></text><text x="530" y="501" class="txt" text-anchor="start"><tspan x="530" dy="0">Read the tool output.</tspan></text><line x1="455" y1="507" x2="455" y2="553" stroke="#6d28d9" stroke-width="2.5" marker-end="url(#arrowPurple)" stroke-dasharray="8 8"/><text x="430" y="590" class="icon">🔁</text><circle cx="490" cy="585" r="15" fill="#7c3aed"/><text x="490" y="590" class="num" text-anchor="middle">5</text><text x="530" y="582" class="sh" text-anchor="start"><tspan x="530" dy="0">Repeat / Stop</tspan></text><text x="530" y="606" class="txt" text-anchor="start"><tspan x="530" dy="0">Continue the loop or answer.</tspan></text><path d="M 330 300 C 300 300 300 540 330 540" fill="none" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrowPurple)" stroke-dasharray="8 8"/><text x="275" y="405" class="small" text-anchor="middle"><tspan x="275" dy="0">Repeat until the</tspan><tspan x="275" dy="22">task is completed</tspan></text><rect x="1045" y="150" width="305" height="430" rx="18" fill="url(#green)" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="1198" y="193" class="h" text-anchor="middle"><tspan x="1198" dy="0">🛠  Tools / Environment</tspan></text><text x="1198" y="225" class="txt" text-anchor="middle"><tspan x="1198" dy="0">External functions, APIs,</tspan><tspan x="1198" dy="22">services, databases, and files.</tspan></text><rect x="1070" y="240" width="255" height="58" rx="10" fill="#f8fff9" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><text x="1090" y="275" class="icon">🔎</text><text x="1130" y="267" class="sh" text-anchor="start"><tspan x="1130" dy="0">Web Search</tspan></text><text x="1130" y="289" class="small" text-anchor="start"><tspan x="1130" dy="0">Current information</tspan></text><rect x="1070" y="318" width="255" height="58" rx="10" fill="#f8fff9" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><text x="1090" y="353" class="icon">🌦</text><text x="1130" y="345" class="sh" text-anchor="start"><tspan x="1130" dy="0">Weather API</tspan></text><text x="1130" y="367" class="small" text-anchor="start"><tspan x="1130" dy="0">Live weather lookup</tspan></text><rect x="1070" y="396" width="255" height="58" rx="10" fill="#f8fff9" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><text x="1090" y="431" class="icon">🧮</text><text x="1130" y="423" class="sh" text-anchor="start"><tspan x="1130" dy="0">Calculator</tspan></text><text x="1130" y="445" class="small" text-anchor="start"><tspan x="1130" dy="0">Deterministic computation</tspan></text><rect x="1070" y="474" width="255" height="58" rx="10" fill="#f8fff9" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/><text x="1090" y="509" class="icon">🗄</text><text x="1130" y="501" class="sh" text-anchor="start"><tspan x="1130" dy="0">Database</tspan></text><text x="1130" y="523" class="small" text-anchor="start"><tspan x="1130" dy="0">Structured data retrieval</tspan></text><line x1="880" y1="360" x2="1045" y2="360" stroke="#15803d" stroke-width="3" marker-end="url(#arrowGreen)"/><text x="965" y="335" class="small" text-anchor="middle"><tspan x="965" dy="0">Action</tspan><tspan x="965" dy="22">(tool input)</tspan></text><line x1="1045" y1="485" x2="880" y2="485" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><text x="965" y="525" class="small" text-anchor="middle"><tspan x="965" dy="0">Observation</tspan><tspan x="965" dy="22">(tool output)</tspan></text><line x1="300" y1="230" x2="380" y2="230" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/><rect x="405" y="690" width="350" height="95" rx="18" fill="url(#amber)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/><text x="580" y="732" class="h" text-anchor="middle"><tspan x="580" dy="0">🏆  Final Answer</tspan></text><text x="580" y="760" class="txt" text-anchor="middle"><tspan x="580" dy="0">Response returned to the user.</tspan></text><line x1="630" y1="645" x2="630" y2="690" stroke="#b45309" stroke-width="3" marker-end="url(#arrowAmber)"/><rect x="865" y="690" width="350" height="95" rx="18" fill="url(#blue)" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/><text x="1040" y="732" class="h" text-anchor="middle"><tspan x="1040" dy="0">👤  User Output</tspan></text><text x="1040" y="760" class="txt" text-anchor="middle"><tspan x="1040" dy="0">Natural-language answer.</tspan></text><line x1="755" y1="737" x2="865" y2="737" stroke="#b45309" stroke-width="3" marker-end="url(#arrowAmber)"/><rect x="70" y="690" width="220" height="105" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/><text x="95" y="722" class="sh" text-anchor="start"><tspan x="95" dy="0">Legend</tspan></text><circle cx="105" cy="750" r="15" fill="#1d4ed8"/><text x="105" y="755" class="num" text-anchor="middle">1</text><text x="128" y="755" class="small" text-anchor="start"><tspan x="128" dy="0">Input</tspan></text><circle cx="105" cy="772" r="15" fill="#6d28d9"/><text x="105" y="777" class="num" text-anchor="middle">2</text><text x="128" y="777" class="small" text-anchor="start"><tspan x="128" dy="0">Reasoning</tspan></text><circle cx="105" cy="794" r="15" fill="#15803d"/><text x="105" y="799" class="num" text-anchor="middle">3</text><text x="128" y="799" class="small" text-anchor="start"><tspan x="128" dy="0">Action</tspan></text><circle cx="105" cy="816" r="15" fill="#1d4ed8"/><text x="105" y="821" class="num" text-anchor="middle">4</text><text x="128" y="821" class="small" text-anchor="start"><tspan x="128" dy="0">Observation</tspan></text><circle cx="105" cy="838" r="15" fill="#b45309"/><text x="105" y="843" class="num" text-anchor="middle">5</text><text x="128" y="843" class="small" text-anchor="start"><tspan x="128" dy="0">Output</tspan></text></svg>