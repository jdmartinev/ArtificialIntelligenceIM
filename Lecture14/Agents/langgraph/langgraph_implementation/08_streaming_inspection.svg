<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
  </filter>
  <style>
    .bg { fill: #f8fafc; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #475569; }
    .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 1.2px; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
    .code { font-family: Consolas, Menlo, monospace; font-size: 13px; fill: #1e293b; }
    .start { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 22; filter: url(#shadow); }
    .agent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .tools { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .router { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; filter: url(#shadow); }
    .end { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 22; filter: url(#shadow); }
    .state { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 20; filter: url(#shadow); }
    .pink { fill: #fdf2f8; stroke: #db2777; stroke-width: 2.3; rx: 22; filter: url(#shadow); }
    .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 20; filter: url(#shadow); }
    .arrow { stroke: #334155; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2.3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<rect width="1200" height="760" class="bg"/>

<text x="60" y="62" class="title">Streaming Execution Inspection</text>
<text x="60" y="94" class="subtitle">graph.stream(...) makes the internal execution visible step by step during teaching and debugging.</text>
<rect x="100" y="280" width="230" height="90" class="gray"/>
<text x="145" y="315" class="label">graph.stream()</text>
<text x="143" y="342" class="tiny">incremental execution</text>
<rect x="455" y="180" width="230" height="80" class="agent"/>
<text x="528" y="228" class="label">agent event</text>
<rect x="455" y="320" width="230" height="80" class="tools"/>
<text x="530" y="368" class="label">tools event</text>
<rect x="455" y="460" width="230" height="80" class="state"/>
<text x="514" y="508" class="label">state update</text>
<rect x="820" y="320" width="250" height="100" class="end"/>
<text x="880" y="356" class="label">Visible trace</text>
<text x="865" y="385" class="tiny">which node ran?</text>
<text x="865" y="408" class="tiny">what message was added?</text>
<path d="M330 325 C390 270 420 230 455 220" class="arrow"/>
<path d="M330 325 L455 360" class="arrow"/>
<path d="M330 325 C390 420 420 490 455 500" class="arrow"/>
<path d="M685 220 C760 250 820 300 850 320" class="arrow"/>
<path d="M685 360 L820 370" class="arrow"/>
<path d="M685 500 C760 465 820 425 850 420" class="arrow"/>

</svg>