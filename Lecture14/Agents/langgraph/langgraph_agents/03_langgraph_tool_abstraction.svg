<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/></marker>
    <style>
      .title { font: 800 44px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: italic 26px Inter, Arial, sans-serif; fill: #4b5563; }
      .h1 { font: 800 27px Inter, Arial, sans-serif; fill: #111827; }
      .h2 { font: 750 22px Inter, Arial, sans-serif; fill: #111827; }
      .body { font: 19px Inter, Arial, sans-serif; fill: #1f2937; }
      .small { font: 16px Inter, Arial, sans-serif; fill: #374151; }
      .tiny { font: 14px Inter, Arial, sans-serif; fill: #475569; }
      .blue { fill:#eff6ff; stroke:#1d4ed8; } .purple { fill:#f5f3ff; stroke:#6d28d9; }
      .green { fill:#f0fdf4; stroke:#15803d; } .gold { fill:#fffbeb; stroke:#b45309; }
      .gray { fill:#f8fafc; stroke:#64748b; } .red { fill:#fff1f2; stroke:#be123c; }
      .box { stroke-width:2.5; rx:18; filter:url(#shadow); }
      .inner { stroke-width:1.8; rx:12; }
      .arrowB { stroke:#1d4ed8; stroke-width:4; fill:none; marker-end:url(#arrowBlue); }
      .arrowG { stroke:#15803d; stroke-width:4; fill:none; marker-end:url(#arrowGreen); }
      .arrowP { stroke:#6d28d9; stroke-width:4; fill:none; marker-end:url(#arrowPurple); }
      .arrowY { stroke:#b45309; stroke-width:4; fill:none; marker-end:url(#arrowGold); }
      .dashP { stroke:#6d28d9; stroke-width:4; fill:none; stroke-dasharray:12 10; marker-end:url(#arrowPurple); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="800" y="60" text-anchor="middle" class="title">LangGraph Tool Abstraction</text>
  <text x="800" y="102" text-anchor="middle" class="subtitle">@tool converts Python functions into LLM-callable tools</text>
  <rect x="150" y="170" width="520" height="570" class="box green"/><text x="410.0" y="208" text-anchor="middle" class="h1">Tool Definition</text><rect x="215" y="260" width="390" height="90" class="inner green"/><text x="237" y="292" text-anchor="start" class="h2">@tool decorator</text><text x="237" y="322" text-anchor="start" class="small">Wraps a Python function</text><rect x="215" y="390" width="390" height="90" class="inner blue"/><text x="237" y="422" text-anchor="start" class="h2">Type hints</text><text x="237" y="452" text-anchor="start" class="small">Define input parameters</text><rect x="215" y="520" width="390" height="90" class="inner purple"/><text x="237" y="552" text-anchor="start" class="h2">Docstring</text><text x="237" y="582" text-anchor="start" class="small">Becomes tool description</text><rect x="900" y="220" width="470" height="450" class="box purple"/><text x="1135.0" y="258" text-anchor="middle" class="h1">What the LLM receives</text><rect x="955" y="320" width="360" height="85" class="inner purple"/><text x="977" y="352" text-anchor="start" class="h2">Tool schema</text><text x="977" y="382" text-anchor="start" class="small">name + description + args</text><rect x="955" y="445" width="360" height="85" class="inner green"/><text x="977" y="477" text-anchor="start" class="h2">Tool call protocol</text><text x="977" y="507" text-anchor="start" class="small">Model emits tool_calls</text><path d="M670 430 C760 430 805 430 900 430" class="arrowP"/><text x="785" y="395" text-anchor="middle" class="small">automatic schema generation</text><rect x="515" y="760" width="570" height="95" class="box gold"/><text x="800.0" y="798" text-anchor="middle" class="h1">Teaching point</text><text x="565" y="825" text-anchor="start" class="body">Students no longer write JSON schema manually; LangChain derives it from the decorated function.</text>
</svg>