<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/></marker>
    <style>
      .title { font: 800 44px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: italic 26px Inter, Arial, sans-serif; fill: #4b5563; }
      .h1 { font: 800 27px Inter, Arial, sans-serif; fill: #111827; }
      .h2 { font: 750 22px Inter, Arial, sans-serif; fill: #111827; }
      .body { font: 19px Inter, Arial, sans-serif; fill: #1f2937; }
      .small { font: 16px Inter, Arial, sans-serif; fill: #374151; }
      .tiny { font: 14px Inter, Arial, sans-serif; fill: #475569; }
      .blue { fill:#eff6ff; stroke:#1d4ed8; } .purple { fill:#f5f3ff; stroke:#6d28d9; }
      .green { fill:#f0fdf4; stroke:#15803d; } .gold { fill:#fffbeb; stroke:#b45309; }
      .gray { fill:#f8fafc; stroke:#64748b; } .red { fill:#fff1f2; stroke:#be123c; }
      .box { stroke-width:2.5; rx:18; filter:url(#shadow); }
      .inner { stroke-width:1.8; rx:12; }
      .arrowB { stroke:#1d4ed8; stroke-width:4; fill:none; marker-end:url(#arrowBlue); }
      .arrowG { stroke:#15803d; stroke-width:4; fill:none; marker-end:url(#arrowGreen); }
      .arrowP { stroke:#6d28d9; stroke-width:4; fill:none; marker-end:url(#arrowPurple); }
      .arrowY { stroke:#b45309; stroke-width:4; fill:none; marker-end:url(#arrowGold); }
      .dashP { stroke:#6d28d9; stroke-width:4; fill:none; stroke-dasharray:12 10; marker-end:url(#arrowPurple); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="800" y="60" text-anchor="middle" class="title">LangGraph ReAct Agent Architecture</text>
  <text x="800" y="102" text-anchor="middle" class="subtitle">The manual while-loop becomes an explicit graph of nodes, edges, and state</text>
  <rect x="60" y="190" width="250" height="150" class="box blue"/><text x="185.0" y="228" text-anchor="middle" class="h1">User Input</text><text x="92" y="260" text-anchor="start" class="body">HumanMessage</text><text x="92" y="292" text-anchor="start" class="small">e.g., weather in Medellín</text><rect x="410" y="150" width="560" height="560" class="box purple"/><text x="690.0" y="188" text-anchor="middle" class="h1">LangGraph ReAct Graph</text><rect x="470" y="235" width="430" height="80" class="inner blue"/><text x="492" y="267" text-anchor="start" class="h2">START</text><text x="492" y="297" text-anchor="start" class="small">Entry point of the graph</text><rect x="470" y="345" width="430" height="95" class="inner purple"/><text x="492" y="377" text-anchor="start" class="h2">agent node</text><text x="492" y="407" text-anchor="start" class="small">Calls llm_with_tools.invoke(messages)</text><rect x="470" y="470" width="430" height="95" class="inner green"/><text x="492" y="502" text-anchor="start" class="h2">tools node</text><text x="492" y="532" text-anchor="start" class="small">ToolNode executes selected tool</text><rect x="470" y="595" width="430" height="80" class="inner gold"/><text x="492" y="627" text-anchor="start" class="h2">END</text><text x="492" y="657" text-anchor="start" class="small">Final assistant answer</text><path d="M310 265 C350 265 365 275 410 275" class="arrowB"/><path d="M685 315 L685 345" class="arrowB"/><path d="M685 440 L685 470" class="arrowG"/><path d="M685 565 L685 595" class="arrowP"/><path d="M900 520 C1015 520 1015 385 900 385" class="dashP"/><rect x="1090" y="190" width="390" height="420" class="box green"/><text x="1285.0" y="228" text-anchor="middle" class="h1">Tools / Environment</text><rect x="1130" y="270" width="310" height="70" class="inner green"/><text x="1152" y="302" text-anchor="start" class="h2">web_search</text><text x="1152" y="332" text-anchor="start" class="small">DDGS web search</text><rect x="1130" y="370" width="310" height="70" class="inner green"/><text x="1152" y="402" text-anchor="start" class="h2">get_weather</text><text x="1152" y="432" text-anchor="start" class="small">wttr.in weather call</text><rect x="1130" y="470" width="310" height="70" class="inner green"/><text x="1152" y="502" text-anchor="start" class="h2">calculate</text><text x="1152" y="532" text-anchor="start" class="small">safe numeric evaluation</text><path d="M970 515 C1030 515 1030 410 1090 410" class="arrowG"/><text x="1010" y="392" text-anchor="start" class="small">tool input</text><path d="M1090 495 C1030 495 1030 550 970 550" class="arrowB"/><text x="1000" y="575" text-anchor="start" class="small">tool output</text><rect x="545" y="760" width="390" height="105" class="box gold"/><text x="740.0" y="798" text-anchor="middle" class="h1">Final Answer</text><text x="590" y="830" text-anchor="start" class="body">Returned to the user after END</text><path d="M935 815 C1020 815 1050 725 1120 650" class="arrowY"/>
</svg>