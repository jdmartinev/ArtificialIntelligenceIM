<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
  </filter>
  <style>
    .bg { fill: #f8fafc; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #475569; }
    .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 1.2px; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
    .code { font-family: Consolas, Menlo, monospace; font-size: 13px; fill: #1e293b; }
    .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .violet { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .red { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 20; filter: url(#shadow); }
    .white { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 18; filter: url(#shadow); }
    .arrow { stroke: #334155; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2.3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<rect width="1200" height="760" class="bg"/>

<text x="60" y="62" class="title">Monolithic Agent vs Multi-Agent System</text>
<text x="60" y="94" class="subtitle">A multi-agent system distributes reasoning, execution and critique across specialized agents.</text>

<text x="110" y="150" class="section">MONOLITHIC AGENT</text>
<rect x="80" y="180" width="410" height="400" class="blue"/>
<circle cx="285" cy="315" r="68" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
<text x="250" y="307" class="label">LLM</text>
<text x="232" y="334" class="tiny">generalist agent</text>
<rect x="145" y="435" width="280" height="68" class="white"/>
<text x="188" y="464" class="small">One agent performs all roles:</text>
<text x="173" y="488" class="tiny">planning · research · writing · review</text>
<path d="M285 383 L285 435" class="arrow"/>

<text x="705" y="150" class="section">MULTI-AGENT SYSTEM</text>
<rect x="650" y="180" width="440" height="400" class="violet"/>
<rect x="785" y="220" width="170" height="64" class="blue"/>
<text x="822" y="259" class="small">Coordinator</text>

<rect x="695" y="360" width="140" height="64" class="green"/>
<text x="724" y="399" class="small">Researcher</text>
<rect x="870" y="360" width="140" height="64" class="green"/>
<text x="915" y="399" class="small">Writer</text>
<rect x="782" y="480" width="176" height="64" class="amber"/>
<text x="830" y="519" class="small">Reviewer</text>

<path d="M870 284 L765 360" class="arrow"/>
<path d="M870 284 L940 360" class="arrow"/>
<path d="M765 424 L870 480" class="arrow"/>
<path d="M940 424 L870 480" class="arrow"/>

<path d="M520 380 L625 380" class="arrow"/>
<text x="530" y="356" class="subtitle">specialization</text>
<text x="530" y="410" class="subtitle">coordination</text>

</svg>