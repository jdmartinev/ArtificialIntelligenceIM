<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
  </filter>
  <style>
    .bg { fill: #f8fafc; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #475569; }
    .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 1.2px; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
    .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
    .code { font-family: Consolas, Menlo, monospace; font-size: 13px; fill: #1e293b; }
    .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .violet { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .red { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 22; filter: url(#shadow); }
    .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 20; filter: url(#shadow); }
    .white { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 18; filter: url(#shadow); }
    .arrow { stroke: #334155; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
    .loop { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2.3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<rect width="1200" height="760" class="bg"/>

<text x="60" y="62" class="title">Multi-Agent Architecture Patterns</text>
<text x="60" y="94" class="subtitle">Four canonical ways to compose specialized agents in agentic AI systems.</text>

<rect x="80" y="155" width="500" height="220" class="violet"/>
<text x="245" y="195" class="label">Orchestrator</text>
<rect x="270" y="230" width="120" height="50" class="blue"/><text x="303" y="261" class="tiny">router</text>
<rect x="130" y="305" width="100" height="44" class="green"/><text x="174" y="333" class="tiny">A</text>
<rect x="280" y="305" width="100" height="44" class="green"/><text x="324" y="333" class="tiny">B</text>
<rect x="430" y="305" width="100" height="44" class="green"/><text x="474" y="333" class="tiny">C</text>
<path d="M330 280 L180 305" class="arrow"/><path d="M330 280 L330 305" class="arrow"/><path d="M330 280 L480 305" class="arrow"/>

<rect x="630" y="155" width="500" height="220" class="blue"/>
<text x="790" y="195" class="label">Sequential Pipeline</text>
<rect x="690" y="285" width="95" height="48" class="green"/><text x="719" y="315" class="tiny">Plan</text>
<rect x="840" y="285" width="95" height="48" class="green"/><text x="868" y="315" class="tiny">Write</text>
<rect x="990" y="285" width="95" height="48" class="green"/><text x="1019" y="315" class="tiny">Edit</text>
<path d="M785 309 L840 309" class="arrow"/><path d="M935 309 L990 309" class="arrow"/>

<rect x="80" y="435" width="500" height="240" class="green"/>
<text x="230" y="475" class="label">Parallel Execution</text>
<rect x="270" y="510" width="120" height="50" class="blue"/><text x="305" y="541" class="tiny">split</text>
<rect x="130" y="595" width="100" height="44" class="gray"/><text x="174" y="623" class="tiny">A</text>
<rect x="280" y="595" width="100" height="44" class="gray"/><text x="324" y="623" class="tiny">B</text>
<rect x="430" y="595" width="100" height="44" class="gray"/><text x="474" y="623" class="tiny">C</text>
<path d="M330 560 L180 595" class="arrow"/><path d="M330 560 L330 595" class="arrow"/><path d="M330 560 L480 595" class="arrow"/>

<rect x="630" y="435" width="500" height="240" class="amber"/>
<text x="800" y="475" class="label">Refinement Loop</text>
<rect x="690" y="555" width="110" height="52" class="green"/><text x="722" y="588" class="tiny">Writer</text>
<rect x="960" y="555" width="110" height="52" class="red"/><text x="993" y="588" class="tiny">Critic</text>
<rect x="825" y="630" width="110" height="52" class="blue"/><text x="856" y="663" class="tiny">Refine</text>
<path d="M800 581 L960 581" class="arrow"/>
<path d="M1015 607 C980 650 940 653 935 656" class="arrow"/>
<path d="M825 656 C745 640 710 620 745 607" class="loop"/>

</svg>